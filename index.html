<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pomodoro</title>

<style>
body{
 font-family:-apple-system;
 background:black;
 color:white;
 text-align:center;
}

#now{color:#aaa;margin-top:10px;}
#status{color:#0a84ff;margin:10px;}

.circle{
 width:260px;height:260px;
 margin:20px auto;
 position:relative;
}

svg{transform:rotate(-90deg);}
circle{fill:none;stroke-width:10;}
.bg{stroke:#1c1c1e;}

.progress{
 stroke:#0a84ff;
 stroke-linecap:round;
 transition:stroke-dashoffset 1s linear;
}

#time{
 position:absolute;
 top:50%;
 width:100%;
 transform:translateY(-50%);
 font-size:42px;
}

button{
 margin:5px;
 padding:10px 14px;
 border:none;
 border-radius:12px;
 background:#1c1c1e;
 color:white;
 font-size:16px;
}

button:active{
 transform:scale(0.9);
 opacity:0.7;
}

input{
 padding:8px;
 border-radius:10px;
 border:none;
}
</style>
</head>

<body>

<div id="now"></div>
<div id="status"></div>

<h2>🍅 Pomodoro</h2>

<div class="circle">
<svg width="260" height="260">
<circle class="bg" cx="130" cy="130" r="110"/>
<circle id="progress" class="progress" cx="130" cy="130" r="110" stroke-dasharray="690"/>
</svg>
<div id="time">25:00</div>
</div>

<button onclick="start()">▶ 시작</button>
<button onclick="pause()">⏸ 일시정지</button>
<button onclick="reset()">🔄 초기화</button>
<button onclick="nextPhase()">⏭ 다음</button>

<h3>과목</h3>
<div id="subjectList"></div>

<input id="newSubject" placeholder="과목 입력">
<button onclick="addSubject()">추가</button>

<button onclick="resetSubjects()">🗑 과목 전체 삭제</button>

<h3>📊 공부시간</h3>
<div id="stats"></div>

<button onclick="resetStats()">🔄 공부시간 초기화</button>

<script>
let focusTime = 1500;
let breakTime = 300;

let mode = "focus";
let remainingTime = focusTime;
let interval = null;
let startTimestamp = null;

let sessions = 0;

let subjects = JSON.parse(localStorage.getItem("subjects")) || [];
let stats = JSON.parse(localStorage.getItem("stats")) || {};
let current = localStorage.getItem("current");

const progress = document.getElementById("progress");

// 현재시간
setInterval(()=>{
 document.getElementById("now").innerText=new Date().toLocaleTimeString();
},1000);

// 상태
function renderStatus(){
 document.getElementById("status").innerText =
  (mode==="focus"?"🔥 집중":"😴 휴식") +
  ` | 🍅 ${sessions}회 | 🔁 ${Math.floor(sessions/4)}사이클`;
}

// 과목 UI (삭제/수정 복구)
function renderSubjects(){
 let div=document.getElementById("subjectList");
 div.innerHTML="";
 subjects.forEach(s=>{
  div.innerHTML+=`
    ${s}
    <button onclick="selectSubject('${s}')">선택</button>
    <button onclick="editSubject('${s}')">수정</button>
    <button onclick="deleteSubject('${s}')">삭제</button>
    <br>
  `;
 });
}

function selectSubject(s){
 current=s;
 localStorage.setItem("current",s);
}

function addSubject(){
 let v=document.getElementById("newSubject").value.trim();
 if(!v) return;

 if(!subjects.includes(v)){
  subjects.push(v);
  stats[v]=0;
 }

 current=v;

 save();
 renderSubjects();
 renderStats();
}

// 삭제
function deleteSubject(s){
 subjects = subjects.filter(x=>x!==s);
 delete stats[s];

 if(current===s) current=null;

 save();
 renderSubjects();
 renderStats();
}

// 수정
function editSubject(s){
 let n = prompt("과목 수정", s);
 if(!n) return;

 subjects = subjects.map(x=>x===s?n:x);
 stats[n] = stats[s];
 delete stats[s];

 if(current===s) current=n;

 save();
 renderSubjects();
 renderStats();
}

// 과목 전체 삭제
function resetSubjects(){
 subjects=[];
 stats={};
 current=null;
 save();
 renderSubjects();
 renderStats();
}

// 공부시간 초기화 (완전 비움)
function resetStats(){
 stats={};
 save();
 renderStats();
}

// 공부시간 표시
function renderStats(){
 let div=document.getElementById("stats");
 div.innerHTML="";
 for(let s in stats){
  if(stats[s]>0){
    div.innerHTML+=`${s}: ${Math.floor(stats[s]/60)}분<br>`;
  }
 }
}

// 저장
function save(){
 localStorage.setItem("subjects",JSON.stringify(subjects));
 localStorage.setItem("stats",JSON.stringify(stats));
 localStorage.setItem("current",current);
}

// 타이머
function update(){
 let now = Date.now();
 let elapsed = Math.floor((now - startTimestamp)/1000);
 let timeLeft = remainingTime - elapsed;

 let duration = (mode==="focus"?focusTime:breakTime);

 if(timeLeft <= 0){
  handleComplete();
  return;
 }

 // 게이지
 progress.style.strokeDashoffset = 690*(1-timeLeft/duration);

 // 공부시간
 if(mode==="focus" && current){
  stats[current]+=1;
 }

 let m=Math.floor(timeLeft/60);
 let s=timeLeft%60;

 document.getElementById("time").innerText =
  String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

 renderStats();
}

// 완료
function handleComplete(){
 clearInterval(interval);

 if(mode==="focus"){
  sessions++;

  if(sessions % 4 === 0){
    renderStatus();
    return;
  }

  mode="break";
  remainingTime=breakTime;
 }else{
  mode="focus";
  remainingTime=focusTime;
 }

 start();
}

// 시작
function start(){
 if(mode==="focus" && !current){
  alert("과목 선택하세요");
  return;
 }

 if(interval) return;

 startTimestamp = Date.now();
 interval=setInterval(update,1000);

 renderStatus();
}

// 일시정지
function pause(){
 if(!interval) return;

 clearInterval(interval);

 let elapsed = Math.floor((Date.now()-startTimestamp)/1000);
 remainingTime -= elapsed;

 interval=null;
}

// 초기화
function reset(){
 clearInterval(interval);
 interval=null;

 mode="focus";
 remainingTime=focusTime;
 sessions=0;

 progress.style.strokeDashoffset=0;
 document.getElementById("time").innerText="25:00";

 renderStatus();
}

// 다음
function nextPhase(){
 clearInterval(interval);

 if(mode==="focus"){
  sessions++;
  mode="break";
  remainingTime=breakTime;
 }else{
  mode="focus";
  remainingTime=focusTime;
 }

 interval=null;
 start();
}

// 실행
renderSubjects();
renderStats();
renderStatus();
</script>

</body>
</html>
