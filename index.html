<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pomodoro</title>
<style>
body{font-family:-apple-system;background:black;color:white;text-align:center;}
button{margin:5px;padding:10px;border-radius:10px;border:none;background:#1c1c1e;color:white;}
button:active{transform:scale(0.9);}
input{padding:8px;border-radius:10px;border:none;}
</style>
</head>
<body>

<h2>🍅 Pomodoro</h2>

<div id="time">25:00</div>

<button onclick="start()">시작</button>
<button onclick="pause()">정지</button>
<button onclick="reset()">리셋</button>

<h3>과목</h3>
<select id="subject"></select>

<input id="newSubject" placeholder="과목 입력">
<button onclick="addSubject()">추가</button>

<h3>📊 공부시간</h3>
<div id="stats"></div>

<button onclick="resetAll()">🔥 전체 초기화</button>

<script>
let focusTime=1500;
let time=focusTime;
let interval=null;

let subjects=JSON.parse(localStorage.getItem("subjects"))||[];
let stats=JSON.parse(localStorage.getItem("stats"))||{};
let current=localStorage.getItem("current");

// ❗ 잘못된 current 제거
if(!subjects.includes(current)) current=null;

const select=document.getElementById("subject");

// 저장
function save(){
 localStorage.setItem("subjects",JSON.stringify(subjects));
 localStorage.setItem("stats",JSON.stringify(stats));
 localStorage.setItem("current",current);
}

// 과목 렌더
function renderSubjects(){
 select.innerHTML="";
 subjects.forEach(s=>{
  let o=document.createElement("option");
  o.value=s;
  o.text=s;
  select.appendChild(o);
 });
 if(current) select.value=current;
}

// 과목 추가 (🔥 핵심 수정)
function addSubject(){
 let v=document.getElementById("newSubject").value.trim();
 if(!v) return;

 if(!subjects.includes(v)){
  subjects.push(v);
 }

 // 👉 stats도 같이 생성
 if(!stats[v]){
  stats[v]=0;
 }

 current=v;
 save();

 renderSubjects();
 renderStats();
}

// 과목 변경
select.onchange=()=>{
 if(interval){
  alert("타이머 멈추고 변경!");
  select.value=current;
  return;
 }
 current=select.value;
 save();
};

// 통계 표시
function renderStats(){
 let div=document.getElementById("stats");
 div.innerHTML="";

 for(let s in stats){
  div.innerHTML+=`${s}: ${Math.floor(stats[s]/60)}분<br>`;
 }
}

// 타이머
function update(){
 time--;

 if(time<=0){
  clearInterval(interval);
  interval=null;

  if(current){
    stats[current]=(stats[current]||0)+focusTime;
  }

  save();
  renderStats();
  alert("🍅 완료!");
  return;
 }

 let m=Math.floor(time/60);
 let s=time%60;
 document.getElementById("time").innerText=
  String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

// 시작
function start(){
 if(!current){
  alert("과목 선택!");
  return;
 }
 if(interval) return;
 interval=setInterval(update,1000);
}

// 정지
function pause(){
 clearInterval(interval);
 interval=null;
}

// 리셋
function reset(){
 clearInterval(interval);
 interval=null;
 time=focusTime;
}

// 🔥 전체 초기화 (핵심 기능)
function resetAll(){
 if(confirm("진짜 전부 삭제할까?")){
  localStorage.clear();
  subjects=[];
  stats={};
  current=null;
  renderSubjects();
  renderStats();
 }
}

// 초기 실행
renderSubjects();
renderStats();
</script>

</body>
</html>
