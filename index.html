<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Pomodoro</title>

<style>
html, body {
 margin:0;
 padding:4px;
 width:100%;
 height:100%;
 background:black;
 color:white;
 font-family:-apple-system;
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
}

/* 상단 */
#now{color:#aaa;font-size:11px;}
#status{color:#0a84ff;margin:2px;font-size:12px;}
h2{margin:4px 0;font-size:18px;}
h3{margin:6px 0 2px;font-size:14px;}

/* 원형 */
.circle{
 width:190px;
 height:190px;
 position:relative;
 display:flex;
 align-items:center;
 justify-content:center;
}

svg{position:absolute; transform:rotate(-90deg);}
circle{fill:none;stroke-width:9;}
.bg{stroke:#1c1c1e;}

.progress{
 stroke:#0a84ff;
 stroke-linecap:round;
 transition:stroke-dashoffset 1s linear;
}

/* 시간 */
#time{
 position:absolute;
 font-size:32px;
 font-weight:600;
}

/* 버튼 */
.controls{
 display:flex;
 gap:6px;
 margin:6px 0;
}

button{
 padding:6px 10px;
 border:none;
 border-radius:10px;
 background:#1c1c1e;
 color:white;
 font-size:13px;
}

button:active{
 transform:scale(0.92);
}

.active{
 background:#0a84ff;
}

input{
 padding:5px;
 border-radius:8px;
 border:none;
 margin-top:4px;
}
</style>
</head>

<body>

<div id="now"></div>
<div id="status"></div>

<h2>🍅 Pomodoro</h2>

<div class="circle">
<svg width="190" height="190">
<circle class="bg" cx="95" cy="95" r="80"/>
<circle id="progress" class="progress" cx="95" cy="95" r="80" stroke-dasharray="502"/>
</svg>
<div id="time">25:00</div>
</div>

<div class="controls">
  <button id="toggleBtn" onclick="toggleTimer()">▶ 시작</button>
  <button onclick="reset()">🔄 초기화</button>
</div>

<button onclick="nextPhase()">⏭ 다음</button>

<h3>과목</h3>
<div id="subjectList"></div>

<input id="newSubject" placeholder="과목 입력">
<button onclick="addSubject()">추가</button>
<button onclick="resetSubjects()">🗑 전체삭제</button>

<h3>📊 공부시간</h3>
<div id="stats"></div>

<button onclick="resetStats()">🔄 공부시간 초기화</button>

<script>
let focusTime = 1500;
let breakTime = 300;

let mode = "focus";
let remainingTime = focusTime;
let interval = null;
let startTimestamp = null;

let sessions = 0;

let subjects = JSON.parse(localStorage.getItem("subjects")) || [];
let stats = JSON.parse(localStorage.getItem("stats")) || {};
let current = localStorage.getItem("current");

const progress = document.getElementById("progress");
const toggleBtn = document.getElementById("toggleBtn");

// 현재 시간
setInterval(()=>{
 document.getElementById("now").innerText=new Date().toLocaleTimeString();
},1000);

// 알림
function notify(msg, cycleEnd=false){
 if(Notification.permission==="granted"){
  new Notification(msg,{silent:true});
 }
 if(cycleEnd && navigator.vibrate){
  navigator.vibrate([300,100,300]);
 }
}

// 상태
function renderStatus(){
 document.getElementById("status").innerText =
  (mode==="focus"?"🔥 집중":"😴 휴식") +
  ` | 🍅 ${sessions}회 | 🔁 ${Math.floor(sessions/4)}사이클`;
}

// 버튼 상태
function updateButton(){
 if(interval){
  toggleBtn.innerText="⏸ 일시정지";
  toggleBtn.classList.add("active");
 }else{
  toggleBtn.innerText="▶ 시작";
  toggleBtn.classList.remove("active");
 }
}

// 토글
function toggleTimer(){
 if(interval){
  pause();
 }else{
  start();
 }
}

// 과목
function renderSubjects(){
 let div=document.getElementById("subjectList");
 div.innerHTML="";
 subjects.forEach(s=>{
  div.innerHTML+=`
    ${s}
    <button onclick="selectSubject('${s}')">선택</button>
    <button onclick="editSubject('${s}')">수정</button>
    <button onclick="deleteSubject('${s}')">삭제</button><br>
  `;
 });
}

function selectSubject(s){ current=s; save(); }

function addSubject(){
 let v=document.getElementById("newSubject").value.trim();
 if(!v) return;

 if(!subjects.includes(v)){
  subjects.push(v);
  stats[v]=0;
 }

 current=v;
 save(); renderSubjects(); renderStats();
}

function deleteSubject(s){
 subjects=subjects.filter(x=>x!==s);
 delete stats[s];
 if(current===s) current=null;
 save(); renderSubjects(); renderStats();
}

function editSubject(s){
 let n=prompt("수정",s);
 if(!n) return;
 subjects=subjects.map(x=>x===s?n:x);
 stats[n]=stats[s];
 delete stats[s];
 if(current===s) current=n;
 save(); renderSubjects(); renderStats();
}

function resetSubjects(){
 subjects=[]; stats={}; current=null;
 save(); renderSubjects(); renderStats();
}

function resetStats(){
 stats={}; save(); renderStats();
}

function renderStats(){
 let div=document.getElementById("stats");
 div.innerHTML="";
 for(let s in stats){
  if(stats[s]>0){
    div.innerHTML+=`${s}: ${Math.floor(stats[s]/60)}분<br>`;
  }
 }
}

function save(){
 localStorage.setItem("subjects",JSON.stringify(subjects));
 localStorage.setItem("stats",JSON.stringify(stats));
 localStorage.setItem("current",current);
}

// 타이머
function update(){
 let now=Date.now();
 let elapsed=Math.floor((now-startTimestamp)/1000);
 let timeLeft=remainingTime-elapsed;
 let duration=(mode==="focus"?focusTime:breakTime);

 if(timeLeft<=0){ handleComplete(); return; }

 progress.style.strokeDashoffset=502*(1-timeLeft/duration);

 if(mode==="focus" && current){
  stats[current]+=1;
 }

 let m=Math.floor(timeLeft/60);
 let s=timeLeft%60;

 document.getElementById("time").innerText =
  String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

 renderStats();
}

// 완료
function handleComplete(){
 clearInterval(interval);
 interval=null;

 if(mode==="focus"){
  sessions++;
  if(sessions%4===0){
    notify("🎉 사이클 완료",true);
    updateButton();
    return;
  }
  mode="break";
  remainingTime=breakTime;
 }else{
  mode="focus";
  remainingTime=focusTime;
 }

 start();
}

// 시작
function start(){
 if(mode==="focus" && !current){
  alert("과목 선택");
  return;
 }

 if(interval) return;

 startTimestamp=Date.now();
 interval=setInterval(update,1000);

 updateButton();
 renderStatus();
}

// 정지
function pause(){
 if(!interval) return;

 clearInterval(interval);

 let elapsed=Math.floor((Date.now()-startTimestamp)/1000);
 remainingTime-=elapsed;

 interval=null;
 updateButton();
}

// 초기화
function reset(){
 clearInterval(interval);
 interval=null;

 mode="focus";
 remainingTime=focusTime;
 sessions=0;

 progress.style.strokeDashoffset=0;
 document.getElementById("time").innerText="25:00";

 updateButton();
 renderStatus();
}

// 다음
function nextPhase(){
 clearInterval(interval);
 interval=null;

 if(mode==="focus"){
  sessions++;
  mode="break";
  remainingTime=breakTime;
 }else{
  mode="focus";
  remainingTime=focusTime;
 }

 start();
}

// 실행
renderSubjects();
renderStats();
renderStatus();
updateButton();
</script>

</body>
</html>
