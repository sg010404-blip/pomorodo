<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pomodoro</title>

<style>
body{
 font-family:-apple-system;
 background:black;
 color:white;
 text-align:center;
}

button{
 margin:5px;
 padding:8px 12px;
 border:none;
 border-radius:10px;
 background:#1c1c1e;
 color:white;
}

button:active{transform:scale(0.9);}

input{
 padding:8px;
 border-radius:10px;
 border:none;
}

.subject-item{
 margin:5px;
}
</style>
</head>

<body>

<h2>🍅 Pomodoro</h2>

<div id="time">25:00</div>

<button onclick="start()">시작</button>
<button onclick="pause()">정지</button>
<button onclick="reset()">리셋</button>

<h3>과목</h3>
<div id="subjectList"></div>

<input id="newSubject" placeholder="과목 입력">
<button onclick="addSubject()">추가</button>

<button onclick="resetSubjects()">🗑 과목 전체 삭제</button>

<h3>📊 공부시간</h3>
<div id="stats"></div>

<button onclick="resetStats()">🔄 공부시간 초기화</button>

<script>
let focusTime=1500;
let time=focusTime;
let interval=null;

let subjects=JSON.parse(localStorage.getItem("subjects"))||[];
let stats=JSON.parse(localStorage.getItem("stats"))||{};
let current=localStorage.getItem("current");

// current 검증
if(!subjects.includes(current)) current=null;

// 저장
function save(){
 localStorage.setItem("subjects",JSON.stringify(subjects));
 localStorage.setItem("stats",JSON.stringify(stats));
 localStorage.setItem("current",current);
}

// 과목 렌더 (🔥 수정/삭제 버튼 포함)
function renderSubjects(){
 let div=document.getElementById("subjectList");
 div.innerHTML="";

 subjects.forEach(s=>{
  let el=document.createElement("div");
  el.className="subject-item";

  el.innerHTML = `
    ${s}
    <button onclick="selectSubject('${s}')">선택</button>
    <button onclick="editSubject('${s}')">수정</button>
    <button onclick="deleteSubject('${s}')">삭제</button>
  `;

  div.appendChild(el);
 });
}

// 과목 선택
function selectSubject(s){
 if(interval){
  alert("타이머 멈추고 변경!");
  return;
 }
 current=s;
 save();
}

// 과목 추가
function addSubject(){
 let v=document.getElementById("newSubject").value.trim();
 if(!v) return;

 if(!subjects.includes(v)){
  subjects.push(v);
  stats[v]=0; // 바로 생성
 }

 current=v;
 save();

 renderSubjects();
 renderStats();
}

// 과목 삭제
function deleteSubject(s){
 if(!confirm(s+" 삭제할까?")) return;

 subjects=subjects.filter(x=>x!==s);
 delete stats[s];

 if(current===s) current=null;

 save();
 renderSubjects();
 renderStats();
}

// 과목 수정
function editSubject(s){
 let newName=prompt("이름 수정",s);
 if(!newName) return;

 subjects=subjects.map(x=>x===s?newName:x);

 stats[newName]=stats[s];
 delete stats[s];

 if(current===s) current=newName;

 save();
 renderSubjects();
 renderStats();
}

// 과목 전체 삭제
function resetSubjects(){
 if(confirm("과목 전부 삭제?")){
  subjects=[];
  current=null;
  stats={};
  save();
  renderSubjects();
  renderStats();
 }
}

// 공부시간 초기화
function resetStats(){
 if(confirm("공부시간 초기화?")){
  for(let s in stats){
    stats[s]=0;
  }
  save();
  renderStats();
 }
}

// 통계
function renderStats(){
 let div=document.getElementById("stats");
 div.innerHTML="";

 for(let s in stats){
  div.innerHTML+=`${s}: ${Math.floor(stats[s]/60)}분<br>`;
 }
}

// 타이머
function update(){
 time--;

 if(time<=0){
  clearInterval(interval);
  interval=null;

  if(current){
    stats[current]+=focusTime;
  }

  save();
  renderStats();
  alert("🍅 완료!");
  return;
 }

 let m=Math.floor(time/60);
 let s=time%60;
 document.getElementById("time").innerText =
  String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

// 시작
function start(){
 if(!current){
  alert("과목 선택!");
  return;
 }
 if(interval) return;
 interval=setInterval(update,1000);
}

// 정지
function pause(){
 clearInterval(interval);
 interval=null;
}

// 리셋
function reset(){
 clearInterval(interval);
 interval=null;
 time=focusTime;
}

// 초기 실행
renderSubjects();
renderStats();
</script>

</body>
</html>
