<!DOCTYPE html>
<html lang="ko">

<title>Pomodoro</title>
<style>
:root{--bg:#000;--card:#111214;--sub:#1c1c1e;--line:#2c2c2e;--text:#fff;--muted:#aaa;--blue:#0a84ff;--overlay:rgba(0,0,0,.62);--warn:#ff9f0a}
*{box-sizing:border-box} html,body{margin:0;width:100%;min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-tap-highlight-color:transparent}
body{padding:max(12px,env(safe-area-inset-top)) max(12px,env(safe-area-inset-right)) max(12px,env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left))}

.top-meta{text-align:center} #now{color:var(--muted);font-size:12px} #status{color:var(--blue);margin-top:4px;font-size:13px} h2{margin:2px 0 0;font-size:20px}
.section{width:100%;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px}.section-title{font-size:14px;font-weight:700;margin-bottom:10px}
.clickable-title{display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer}.clickable-title .hint{font-size:11px;color:#8e8e93;font-weight:500}
.circle-wrap{display:flex;justify-content:center;align-items:center;padding:6px 0 2px}.circle{width:min(68vw,240px);height:min(68vw,240px);max-width:240px;max-height:240px;min-width:180px;min-height:180px;position:relative;display:flex;align-items:center;justify-content:center}
.circle svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)} circle{fill:none;stroke-width:10}.bg{stroke:#1c1c1e}.progress{stroke:var(--blue);stroke-linecap:round;transition:stroke-dashoffset .25s linear}
#time{position:absolute;font-size:clamp(28px,8vw,40px);font-weight:700;letter-spacing:-.5px} #currentSubjectLabel{margin-top:8px;text-align:center;font-size:13px;color:#d1d1d6;word-break:break-word;min-height:18px}
.controls,.controls-stack{display:flex;gap:8px;flex-wrap:wrap;width:100%}.controls button,.controls-stack button,.subject-actions button,.add-row button{flex:1}
button{padding:10px 12px;border:none;border-radius:12px;background:var(--sub);color:#fff;font-size:14px;font-weight:600} button:active{transform:scale(.97)} button.active{background:var(--blue)} button.secondary{background:#2b2b2f}
input{width:100%;padding:11px 12px;border-radius:12px;border:1px solid var(--line);background:#0c0c0d;color:#fff;font-size:14px;outline:none}
.subject-list,.stats-list{display:flex;flex-direction:column;gap:8px;max-height:220px;overflow:auto;-webkit-overflow-scrolling:touch}.subject-item,.stat-item{width:100%;background:#0d0d0f;border:1px solid var(--line);border-radius:12px;padding:10px}
.subject-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}.subject-name{font-size:14px;font-weight:600;word-break:break-word}.subject-name.selected{color:var(--blue)}
.subject-badge{flex-shrink:0;font-size:11px;color:#d1d1d6;background:#1d1d20;padding:4px 7px;border-radius:999px}.subject-actions{display:flex;gap:6px;flex-wrap:wrap}.subject-actions button{min-width:72px;padding:8px 10px;font-size:13px;border-radius:10px}
.add-row{display:flex;gap:8px;margin-top:10px}.add-row input{flex:1}.empty{color:var(--muted);font-size:13px;text-align:center;padding:8px 0}#authStatus{margin-top:8px;font-size:12px;color:#aaa;word-break:break-word}#deviceWarning{margin-top:4px;font-size:12px;color:var(--warn);display:none}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0);display:none;align-items:flex-end;justify-content:center;z-index:9999;padding:max(12px,env(safe-area-inset-top)) max(12px,env(safe-area-inset-right)) max(12px,env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));transition:background .22s ease}
.modal.show{display:flex;background:var(--overlay)} .modal-sheet{width:100%;max-width:430px;max-height:min(84vh,780px);background:#121214;border:1px solid #2a2a2d;border-radius:20px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.45);display:flex;flex-direction:column}
.modal-head{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:14px 14px 10px;border-bottom:1px solid #252528}.modal-title{font-size:16px;font-weight:800}.modal-sub{margin-top:4px;font-size:12px;color:#9b9ba1}.icon-btn{padding:8px 12px;border-radius:12px;background:#242428;font-size:13px}
.modal-body{overflow:auto;-webkit-overflow-scrolling:touch;padding:12px;display:flex;flex-direction:column;gap:14px}.day-card{background:#0d0d0f;border:1px solid #26262a;border-radius:16px;padding:12px;display:flex;flex-direction:column;gap:12px}
.day-head{display:flex;justify-content:space-between;gap:10px;padding-bottom:8px;border-bottom:1px solid #232327}.day-title{font-size:16px;font-weight:800}.day-subtitle{margin-top:4px;font-size:12px;color:#9f9fa6}.day-badge{background:#17171a;border:1px solid #2b2b30;color:#d7d7dd;border-radius:999px;padding:6px 10px;font-size:11px;font-weight:700;white-space:nowrap}
.summary-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.summary-item{background:#151518;border:1px solid #2b2b30;border-radius:12px;padding:10px}.summary-label{font-size:11px;color:#999;margin-bottom:4px}.summary-value{font-size:15px;font-weight:800;word-break:break-word}
.block-title{font-size:13px;font-weight:800;margin-bottom:8px}.chart-wrap{display:grid;grid-template-columns:120px 1fr;gap:12px;align-items:center;background:#151518;border:1px solid #2b2b30;border-radius:14px;padding:12px}
.donut-card{display:flex;align-items:center;justify-content:center}.donut{width:108px;height:108px;border-radius:50%;position:relative;background:#222;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}.donut::after{content:"";position:absolute;inset:18px;border-radius:50%;background:#0d0d0f;box-shadow:inset 0 0 0 1px rgba(255,255,255,.04)}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;text-align:center;padding:0 10px}.donut-center-label{font-size:10px;color:#9f9fa6}.donut-center-value{font-size:13px;font-weight:800}
.mini-legend,.legend-list,.log-list{display:flex;flex-direction:column;gap:8px}.mini-legend-item,.legend-item,.log-item{display:flex;align-items:center;gap:10px;background:#151518;border:1px solid #2b2b30;border-radius:12px;padding:10px}.mini-legend-dot,.legend-dot{width:12px;height:12px;border-radius:999px;flex:0 0 auto}.mini-legend-text,.legend-main,.log-main{min-width:0;flex:1}.mini-legend-main,.legend-subject,.log-subject{font-size:14px;font-weight:700;word-break:break-word}.mini-legend-sub,.legend-time,.log-time{margin-top:3px;font-size:12px;color:#a0a0a6}
.timeline-box{display:flex;flex-direction:column;gap:8px}.timeline-scale{display:flex;justify-content:space-between;font-size:11px;color:#999}.timeline-track{position:relative;width:100%;height:48px;border-radius:12px;background:linear-gradient(to right,#17171a,#101012);border:1px solid #2b2b30;overflow:hidden}.timeline-hour-line{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.07)}.timeline-block{position:absolute;top:7px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 8px;min-width:4px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);overflow:hidden}.timeline-block-label{font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 1px rgba(0,0,0,.25);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.log-duration{font-size:12px;color:#d8d8dd;font-weight:700}.day-empty{background:#151518;border:1px solid #2b2b30;border-radius:12px;padding:14px;color:#a7a7ae;text-align:center;font-size:13px}
@media (max-width:360px){.subject-actions button,.controls button{min-width:100%}.add-row{flex-direction:column}.summary-grid{grid-template-columns:1fr}.chart-wrap{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="top-meta">
    <div id="now"></div>
    <div id="status"></div>
    <h2>🍅 Pomodoro</h2>
  </div>

  <div class="section">
    <div class="section-title">☁️ 동기화</div>
    <input id="email" type="email" placeholder="이메일">
    <input id="password" type="password" placeholder="비밀번호">
    <div class="controls">
      <button id="signupBtn">가입</button>
      <button id="loginBtn">로그인</button>
      <button id="logoutBtn">로그아웃</button>
    </div>
    <div id="authStatus">로그인 안됨</div>
    <div id="deviceWarning"></div>
  </div>

  <div class="section">
    <div class="circle-wrap">
      <div class="circle">
        <svg viewBox="0 0 220 220"><circle class="bg" cx="110" cy="110" r="92"></circle><circle id="progress" class="progress" cx="110" cy="110" r="92"></circle></svg>
        <div id="time">25:00</div>
      </div>
    </div>
    <div id="currentSubjectLabel">선택된 과목 없음</div>
    <div class="controls" style="margin-top:12px;">
      <button id="startBtn">▶ 시작</button>
      <button id="resetBtn" class="secondary">🔄 초기화</button>
      <button id="nextBtn" class="secondary">⏭ 다음</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">과목</div>
    <div id="subjectList" class="subject-list"></div>
    <div class="add-row">
      <input id="subjectInput" placeholder="과목 추가">
      <button id="addSubjectBtn">추가</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title clickable-title" id="statsToggle">
      <span>📊 공부시간</span>
      <span class="hint">탭하면 그래프 보기</span>
    </div>
    <div id="statsList" class="stats-list"></div>
  </div>
  <div class="footer-space"></div>
</div>

<div id="timelineModal" class="modal">
  <div class="modal-sheet">
    <div class="modal-head">
      <div>
        <div class="modal-title">공부 그래프</div>
        <div class="modal-sub">날짜별 공부 기록</div>
      </div>
      <button class="icon-btn" id="closeModalBtn">닫기</button>
    </div>
    <div id="timelineDaysContainer" class="modal-body"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCglmlY0fLtAmY-8kQog2juigduYVWztgQ",
  authDomain: "pomodoro-sync-39373.firebaseapp.com",
  projectId: "pomodoro-sync-39373",
  storageBucket: "pomodoro-sync-39373.firebasestorage.app",
  messagingSenderId: "669496398439",
  appId: "1:669496398439:web:31fb53a7bc873e3ff93ac2",
  databaseURL: "https://pomodoro-sync-39373-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const rtdb = getDatabase(app);
if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js").catch(()=>{});

const FOCUS = 1500, BREAK = 300, RADIUS = 92, DASH = 2*Math.PI*RADIUS;
const DEVICE_ID_KEY = "pomodoro_device_id";
const LOCAL_STATE_KEY = "pomodoro_local_state";
let serverOffset=0,user=null,unsub=null,pushTimer=null,timer=null,applyingRemote=false;
let running=false,mode="focus",remaining=FOCUS,endAt=null,current="",sessions=0,subjects=[],studyLogs=[];
const progressEl=document.getElementById("progress");
const timeEl=document.getElementById("time");
const subjectListEl=document.getElementById("subjectList");
const subjectInputEl=document.getElementById("subjectInput");
const statsListEl=document.getElementById("statsList");
const nowEl=document.getElementById("now");
const statusEl=document.getElementById("status");
const currentSubjectLabelEl=document.getElementById("currentSubjectLabel");
const emailEl=document.getElementById("email");
const passwordEl=document.getElementById("password");
const authStatusEl=document.getElementById("authStatus");
const timelineModalEl=document.getElementById("timelineModal");
const timelineDaysContainerEl=document.getElementById("timelineDaysContainer");
const deviceId=localStorage.getItem(DEVICE_ID_KEY)||(()=>{const v=`device_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;localStorage.setItem(DEVICE_ID_KEY,v);return v})();
progressEl.setAttribute("stroke-dasharray",DASH);progressEl.setAttribute("stroke-dashoffset",DASH);
onValue(ref(rtdb,".info/serverTimeOffset"),snap=>serverOffset=Number(snap.val()||0));
const serverNow=()=>Date.now()+serverOffset;
const mmss=sec=>{sec=Math.max(0,Math.floor(sec));const m=Math.floor(sec/60),s=sec%60;return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`};
const durationText=sec=>{sec=Math.max(0,Math.floor(sec));const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;if(h>0)return `${h}시간 ${m}분 ${s}초`;if(m>0)return `${m}분 ${s}초`;return `${s}초`};
const dayNames=["일","월","화","수","목","금","토"];
const escapeHtml=str=>String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");
function requestNoticePermissionOnce(){if("Notification" in window && Notification.permission==="default"){Notification.requestPermission().catch(()=>{});}}
function notify(msg,cycleEnd=false){if("Notification" in window && Notification.permission==="granted"){try{new Notification(msg,{silent:true});}catch(e){}} if(cycleEnd&&navigator.vibrate) navigator.vibrate(60)}
function localClock(){return new Date().toLocaleTimeString()}
function dateKey(ms){const d=new Date(ms);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function dayTitle(key){const [y,m,d]=key.split("-").map(Number);const dt=new Date(y,m-1,d);return `${y}년 ${m}월 ${d}일 (${dayNames[dt.getDay()]})`}
function clockText(ms){const d=new Date(ms);return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`}
function saveLocal(){localStorage.setItem(LOCAL_STATE_KEY,JSON.stringify({running,mode,remaining,endAt,current,sessions,subjects,studyLogs}))}
function loadLocal(){const raw=localStorage.getItem(LOCAL_STATE_KEY);if(!raw)return;try{const s=JSON.parse(raw);running=!!s.running;mode=s.mode||"focus";remaining=Number.isFinite(s.remaining)?s.remaining:FOCUS;endAt=s.endAt||null;current=s.current||"";sessions=Number.isFinite(s.sessions)?s.sessions:0;subjects=Array.isArray(s.subjects)?s.subjects:[];studyLogs=Array.isArray(s.studyLogs)?s.studyLogs:[]}catch(e){}}
function stateRef(uid){return doc(db,"users",uid,"pomodoro","data")}
function getLeft(){return (!running||!endAt)?remaining:Math.max(0,Math.ceil((endAt-serverNow())/1000))}
function openLog(){if(mode!=="focus"||!current)return;if(studyLogs.find(x=>x.end==null))return;studyLogs.push({subject:current,start:serverNow(),end:null})}
function closeLog(){const log=[...studyLogs].reverse().find(x=>x.end==null);if(log)log.end=serverNow()}
function getStatsMap(){const map={};subjects.forEach(s=>map[s]=0);studyLogs.forEach(log=>{const end=log.end==null?serverNow():log.end;const sec=Math.max(0,Math.floor((end-log.start)/1000));map[log.subject]=(map[log.subject]||0)+sec});return map}
function renderNow(){nowEl.textContent=localClock()}
function renderStatus(){statusEl.textContent=`${mode==="focus"?"🔥 집중":"😴 휴식"} | 🍅 ${sessions}회 | 🔁 ${Math.floor(sessions/4)}사이클`}
function renderCurrent(){currentSubjectLabelEl.textContent=current?`현재 과목: ${current}`:"선택된 과목 없음"}
function renderTimer(){remaining=getLeft();timeEl.textContent=mmss(remaining);const total=mode==="focus"?FOCUS:BREAK;progressEl.style.strokeDashoffset=String(DASH*(1-Math.max(0,Math.min(1,remaining/total))));const startBtn=document.getElementById("startBtn");startBtn.textContent=running?"⏸ 일시정지":"▶ 시작";startBtn.classList.toggle("active",running)}
function renderSubjects(){subjectListEl.innerHTML="";if(!subjects.length){subjectListEl.innerHTML='<div class="empty">아직 추가된 과목이 없어</div>';return;}subjects.forEach(subject=>{const item=document.createElement("div");item.className="subject-item";item.innerHTML=`<div class="subject-top"><div class="subject-name ${current===subject?"selected":""}">${escapeHtml(subject)}</div><div class="subject-badge">${current===subject?"선택됨":""}</div></div><div class="subject-actions"><button data-a="select">선택</button><button data-a="edit">수정</button><button data-a="delete">삭제</button></div>`;item.querySelector('[data-a="select"]').onclick=()=>{current=subject;saveLocal();queueRemoteSave();refresh()};item.querySelector('[data-a="edit"]').onclick=()=>{const n=prompt("수정",subject);if(!n)return;const v=n.trim();if(!v)return;if(v!==subject&&subjects.includes(v)){alert("이미 있는 과목명이야.");return;}subjects=subjects.map(s=>s===subject?v:s);studyLogs=studyLogs.map(log=>log.subject===subject?({...log,subject:v}):log);if(current===subject)current=v;saveLocal();queueRemoteSave();refresh()};item.querySelector('[data-a="delete"]').onclick=()=>{if(running&&current===subject){alert("실행 중인 과목은 먼저 일시정지해줘.");return;}subjects=subjects.filter(s=>s!==subject);studyLogs=studyLogs.filter(log=>log.subject!==subject);if(current===subject)current="";saveLocal();queueRemoteSave();refresh()};subjectListEl.appendChild(item)})}
function renderStats(){const entries=Object.entries(getStatsMap()).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);statsListEl.innerHTML=entries.length?"":'<div class="empty">아직 기록된 공부시간이 없어</div>';entries.forEach(([subject,sec])=>{const row=document.createElement("div");row.className="stat-item";row.innerHTML=`<div style="font-weight:700;margin-bottom:4px;">${escapeHtml(subject)}</div><div style="color:#d1d1d6;font-size:13px;">${durationText(sec)}</div>`;statsListEl.appendChild(row)})}
function refresh(){renderNow();renderStatus();renderCurrent();renderTimer();renderSubjects();renderStats()}
function tick(){refresh();if(running&&getLeft()<=0)completePhase()}
function startTicker(){stopTicker();timer=setInterval(tick,250)}
function stopTicker(){if(timer){clearInterval(timer);timer=null}}
function logsByDay(){const grouped={};studyLogs.forEach(log=>{const realEnd=log.end==null?serverNow():log.end;let cursor=log.start;while(cursor<realEnd){const d=new Date(cursor);const dayStart=new Date(d.getFullYear(),d.getMonth(),d.getDate(),0,0,0,0).getTime();const nextDay=dayStart+86400000;const segEnd=Math.min(realEnd,nextDay);const key=dateKey(cursor);if(!grouped[key])grouped[key]=[];grouped[key].push({subject:log.subject,start:cursor,end:segEnd});cursor=segEnd}});Object.keys(grouped).forEach(k=>grouped[k].sort((a,b)=>a.start-b.start));return grouped}
function subjectColor(subject){const colors=["#0a84ff","#30d158","#ff9f0a","#ff375f","#bf5af2","#64d2ff","#ffd60a","#40c8a8"];let hash=0;for(let i=0;i<subject.length;i++)hash=(hash*31+subject.charCodeAt(i))>>>0;return colors[hash%colors.length]}
function donutGradient(entries){const total=entries.reduce((s,[,v])=>s+v,0);if(total<=0)return"#222";let acc=0;const parts=[];entries.forEach(([subject,sec])=>{const start=(acc/total)*360;acc+=sec;const end=(acc/total)*360;parts.push(`${subjectColor(subject)} ${start}deg ${end}deg`)});return`conic-gradient(${parts.join(",")})`}
function renderHourLines(trackEl,startHour,endHour){const hours=Math.max(1,endHour-startHour);for(let i=0;i<=hours;i++){const line=document.createElement("div");line.className="timeline-hour-line";line.style.left=`${(i/hours)*100}%`;trackEl.appendChild(line)}}
function renderGraphModal(){const grouped=logsByDay();const keys=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));timelineDaysContainerEl.innerHTML="";if(!keys.length){timelineDaysContainerEl.innerHTML='<div class="day-card"><div class="day-empty">아직 기록된 공부 로그가 없어.</div></div>';return;}keys.forEach(key=>{const logs=grouped[key];const totals={};logs.forEach(log=>{const sec=Math.max(0,Math.floor((log.end-log.start)/1000));totals[log.subject]=(totals[log.subject]||0)+sec});const entries=Object.entries(totals).sort((a,b)=>b[1]-a[1]);const totalSec=entries.reduce((s,[,v])=>s+v,0);const firstStart=logs[0].start,lastEnd=logs[logs.length-1].end;const card=document.createElement("div");card.className="day-card";card.innerHTML=`<div class="day-head"><div><div class="day-title">${dayTitle(key)}</div><div class="day-subtitle">${clockText(firstStart)} ~ ${clockText(lastEnd)}</div></div><div class="day-badge">${durationText(totalSec)}</div></div><div class="summary-grid"><div class="summary-item"><div class="summary-label">총 공부시간</div><div class="summary-value">${durationText(totalSec)}</div></div><div class="summary-item"><div class="summary-label">과목 수</div><div class="summary-value">${entries.length}개</div></div><div class="summary-item"><div class="summary-label">첫 시작</div><div class="summary-value">${clockText(firstStart)}</div></div><div class="summary-item"><div class="summary-label">마지막 기록</div><div class="summary-value">${clockText(lastEnd)}</div></div></div>`;const chartWrap=document.createElement("div");chartWrap.className="chart-wrap";chartWrap.innerHTML=`<div class="donut-card"><div class="donut" style="background:${donutGradient(entries)}"><div class="donut-center"><div class="donut-center-label">총 공부시간</div><div class="donut-center-value">${durationText(totalSec)}</div></div></div></div><div class="mini-legend"></div>`;const legend=chartWrap.querySelector(".mini-legend");entries.forEach(([subject,sec])=>{const percent=totalSec>0?Math.round(sec/totalSec*100):0;const row=document.createElement("div");row.className="mini-legend-item";row.innerHTML=`<div class="mini-legend-dot" style="background:${subjectColor(subject)}"></div><div class="mini-legend-text"><div class="mini-legend-main">${escapeHtml(subject)}</div><div class="mini-legend-sub">${durationText(sec)} · ${percent}%</div></div>`;legend.appendChild(row)});card.appendChild(chartWrap);const timelineSection=document.createElement("div");timelineSection.innerHTML='<div class="block-title">타임라인</div><div class="timeline-box"><div class="timeline-scale"><span></span><span></span><span></span></div><div class="timeline-track"></div></div>';const track=timelineSection.querySelector(".timeline-track");const firstHour=Math.floor(new Date(firstStart).getHours());const lastDate=new Date(lastEnd);const endHour=Math.min(24,Math.max(firstHour+1,Math.ceil(lastDate.getHours()+lastDate.getMinutes()/60)));const scale=timelineSection.querySelector(".timeline-scale").children;scale[0].textContent=`${String(firstHour).padStart(2,"0")}:00`;scale[1].textContent=`${String(Math.floor((firstHour+endHour)/2)).padStart(2,"0")}:00`;scale[2].textContent=`${String(endHour).padStart(2,"0")}:00`;renderHourLines(track,firstHour,endHour);const rangeMinutes=Math.max(60,(endHour-firstHour)*60);logs.forEach(log=>{const sd=new Date(log.start),ed=new Date(log.end);const startMin=(sd.getHours()*60+sd.getMinutes())-(firstHour*60);const endMin=(ed.getHours()*60+ed.getMinutes()+ed.getSeconds()/60)-(firstHour*60);const left=(startMin/rangeMinutes)*100;const width=Math.max(1.4,((endMin-startMin)/rangeMinutes)*100);const block=document.createElement("div");block.className="timeline-block";block.style.left=`${left}%`;block.style.width=`${width}%`;block.style.background=subjectColor(log.subject);block.innerHTML=`<div class="timeline-block-label">${escapeHtml(log.subject)}</div>`;track.appendChild(block)});card.appendChild(timelineSection);const details=document.createElement("div");details.innerHTML='<div class="block-title">세부 기록</div><div class="log-list"></div>';const logList=details.querySelector(".log-list");logs.forEach(log=>{const sec=Math.max(0,Math.floor((log.end-log.start)/1000));const item=document.createElement("div");item.className="log-item";item.innerHTML=`<div class="legend-dot" style="background:${subjectColor(log.subject)}"></div><div class="log-main"><div class="log-subject">${escapeHtml(log.subject)}</div><div class="log-time">${clockText(log.start)} ~ ${clockText(log.end)}</div></div><div class="log-duration">${durationText(sec)}</div>`;logList.appendChild(item)});card.appendChild(details);timelineDaysContainerEl.appendChild(card)})}
function openModal(){renderGraphModal();timelineModalEl.classList.add("show");document.body.style.overflow="hidden"}
function closeModal(){timelineModalEl.classList.remove("show");document.body.style.overflow=""}
async function pushRemote(){if(!user||applyingRemote)return;await setDoc(stateRef(user.uid),{subjects,current,sessions,studyLogs,state:{running,mode,remaining,endAt},updatedAt:serverNow(),updatedBy:deviceId},{merge:true})}
function queueRemoteSave(){if(!user||applyingRemote)return;clearTimeout(pushTimer);pushTimer=setTimeout(()=>pushRemote().catch(()=>{}),250)}
async function loadRemote(){if(!user)return;const snap=await getDoc(stateRef(user.uid));if(!snap.exists())return;const data=snap.data();applyingRemote=true;subjects=Array.isArray(data.subjects)?data.subjects:[];current=data.current||"";sessions=Number.isFinite(data.sessions)?data.sessions:0;studyLogs=Array.isArray(data.studyLogs)?data.studyLogs:[];const st=data.state||{};running=!!st.running;mode=st.mode||"focus";remaining=Number.isFinite(st.remaining)?st.remaining:FOCUS;endAt=st.endAt||null;applyingRemote=false}
async function subscribeRemote(uid){if(unsub){unsub();unsub=null}await loadRemote();refresh();if(running)startTicker();else stopTicker();unsub=onSnapshot(stateRef(uid),snap=>{if(!snap.exists())return;const data=snap.data();if(!data||data.updatedBy===deviceId)return;applyingRemote=true;subjects=Array.isArray(data.subjects)?data.subjects:[];current=data.current||"";sessions=Number.isFinite(data.sessions)?data.sessions:0;studyLogs=Array.isArray(data.studyLogs)?data.studyLogs:[];const st=data.state||{};running=!!st.running;mode=st.mode||"focus";remaining=Number.isFinite(st.remaining)?st.remaining:FOCUS;endAt=st.endAt||null;applyingRemote=false;saveLocal();refresh();if(running)startTicker();else stopTicker()})}
async function signup(){const email=emailEl.value.trim(),pw=passwordEl.value.trim();if(!email||!pw)return alert("이메일과 비밀번호를 입력해줘.");try{await createUserWithEmailAndPassword(auth,email,pw);authStatusEl.textContent="가입 성공"}catch(e){alert(e.message)}}
async function login(){const email=emailEl.value.trim(),pw=passwordEl.value.trim();if(!email||!pw)return alert("이메일과 비밀번호를 입력해줘.");try{await signInWithEmailAndPassword(auth,email,pw);authStatusEl.textContent="로그인 성공"}catch(e){alert(e.message)}}
async function logout(){try{if(running)await pauseTimer();await signOut(auth);authStatusEl.textContent="로그인 안됨"}catch(e){alert(e.message)}}
async function startTimer(){if(running)return;if(mode==="focus"&&!current)return alert("과목을 먼저 선택해줘.");requestNoticePermissionOnce();if(navigator.vibrate)navigator.vibrate(20);running=true;endAt=serverNow()+(remaining*1000);openLog();refresh();startTicker();saveLocal();queueRemoteSave()}
async function pauseTimer(){if(!running)return;remaining=getLeft();running=false;endAt=null;closeLog();refresh();stopTicker();saveLocal();queueRemoteSave()}
async function resetTimer(){if(running)closeLog();running=false;mode="focus";remaining=FOCUS;endAt=null;sessions=0;refresh();stopTicker();saveLocal();queueRemoteSave()}
async function completePhase(){if(running)closeLog();running=false;endAt=null;if(mode==="focus"){sessions+=1;if(sessions%4===0){notify("🎉 1사이클 완료",true);setTimeout(()=>alert("🎉 1사이클 완료"),50)}mode="break";remaining=BREAK}else{mode="focus";remaining=FOCUS}refresh();stopTicker();saveLocal();queueRemoteSave();await startTimer()}
async function nextPhase(){if(running)closeLog();running=false;endAt=null;if(mode==="focus"){sessions+=1;mode="break";remaining=BREAK}else{mode="focus";remaining=FOCUS}refresh();stopTicker();saveLocal();queueRemoteSave();await startTimer()}

onAuthStateChanged(auth,async u=>{user=u;if(!u){authStatusEl.textContent="로그인 안됨";if(unsub){unsub();unsub=null}return}authStatusEl.textContent=`로그인됨: ${u.email}`;await subscribeRemote(u.uid)});
document.getElementById("startBtn").onclick=()=>running?pauseTimer():startTimer();
document.getElementById("resetBtn").onclick=()=>resetTimer();
document.getElementById("nextBtn").onclick=()=>nextPhase();
document.getElementById("addSubjectBtn").onclick=()=>{const v=subjectInputEl.value.trim();if(!v)return;if(!subjects.includes(v))subjects.push(v);current=v;subjectInputEl.value="";saveLocal();queueRemoteSave();refresh()};
subjectInputEl.addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("addSubjectBtn").click()});
document.getElementById("signupBtn").onclick=signup;document.getElementById("loginBtn").onclick=login;document.getElementById("logoutBtn").onclick=logout;document.getElementById("statsToggle").onclick=openModal;document.getElementById("closeModalBtn").onclick=closeModal;timelineModalEl.onclick=e=>{if(e.target===timelineModalEl)closeModal()};
window.addEventListener("online",()=>queueRemoteSave());window.addEventListener("beforeunload",saveLocal);document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="hidden"){saveLocal();queueRemoteSave()}});document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal()});
loadLocal();refresh();renderNow();setInterval(renderNow,1000);if(running)startTicker();
</script>
</body>
